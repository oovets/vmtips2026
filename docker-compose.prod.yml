# Produktionsstack: app (Next.js) + Postgres + Caddy (auto-HTTPS).
# Kör:  docker compose -f docker-compose.prod.yml up -d --build
name: vmtips
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: vmtips
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vmtips
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vmtips"]
      interval: 5s
      timeout: 5s
      retries: 15

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
