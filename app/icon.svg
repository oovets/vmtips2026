<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Blue ball -->
  <circle cx="50" cy="50" r="47" fill="#006AA7"/>
  <!-- Seam lines from center pentagon to edge patches -->
  <line x1="50" y1="30" x2="50" y2="7"  stroke="#FECC00" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="69" y1="44" x2="90" y2="37" stroke="#FECC00" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="62" y1="66" x2="75" y2="84" stroke="#FECC00" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="38" y1="66" x2="25" y2="84" stroke="#FECC00" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="31" y1="44" x2="10" y2="37" stroke="#FECC00" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Center pentagon -->
  <polygon points="50,30 69,44 62,66 38,66 31,44" fill="#FECC00"/>
  <!-- Edge patches -->
  <circle cx="50" cy="6"  r="9.5" fill="#FECC00"/>
  <circle cx="91" cy="36" r="9.5" fill="#FECC00"/>
  <circle cx="76" cy="85" r="9.5" fill="#FECC00"/>
  <circle cx="24" cy="85" r="9.5" fill="#FECC00"/>
  <circle cx="9"  cy="36" r="9.5" fill="#FECC00"/>
  <!-- Outline -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#00568a" stroke-width="2.5"/>
</svg>
